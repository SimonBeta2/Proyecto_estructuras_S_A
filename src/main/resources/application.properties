spring.application.name=demo
server.port=${PORT:8080}
spring.profiles.active=dev

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-min-256-bits-long-please-change-this-in-production-environment}
jwt.expiration=86400000

# CORS Configuration - Supports multiple origins separated by comma
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,https://domu-services.vercel.app}

redirectUri=${REDIRECT_URI_CALLBACK:http://localhost:8080/api/auth/user}
